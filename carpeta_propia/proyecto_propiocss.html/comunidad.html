<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>/NEW ORDER/</title>
     <link rel="stylesheet" href="stly.css" />

  </head>
  <body>
    <header>
      <!-- Span sirve para darle estilo a una porcion interna de un texto -->
      <h1 class="orden"> NEW ORDER </h1>
      <!-- La nav es la etiqueta de navegacion por excelencia -->
      <nav>
        <ul>
          <li><a href="proyecto_propiocss.html">Inicio</a></li>
          <li class="services">
            <a href="Acercadelevento.html"> <span>Acerca del evento</span> </a>
          </li>
          <li><a href="entradasdisponibles.html">Entradas disponibles</a></li>
          <li><a href="proxshows.html">Proximos Shows</a></li>
          <li><a href="comunidad.html">Comunidad</a></li>
        </ul>
      </nav>

      <section class="formulario">
        <h2>Contacto</h2>
        <form>
          <!-- El proposito de label es guiar al usario de que debe escribir en el campo -->
          <label for="nombre">Nombre:</label>
          <input placeholder="Nombre..." type="text" name="nombre" />
          <br />
          <label for="Apellido">Apellido:</label>
          <input placeholder= "Apellido.." type="text" name="Apellido" />
          <br />
          <label for="motivo">Motivo de contacto</label>
          <select name="motivo">
            <option value="trabajo">Quiero recibir notificaciones</option>
            <option value="consulta-servicios">
              Quiero requerir sus servicios
            </option>
            <option value="otro">Otro motivo</option>
          </select>
          <br />
          <label for="mensaje">Mensaje:</label>
          <!-- Text area es un input de texto largo -->
          <textarea name="mensaje"></textarea>

          <div>
            <button id="send" type="submit">Enviar</button>
            <button id="reset" class="reset-button" type="reset">Reset</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
